{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Vivah — Begin a Marriage Search With Care{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Mukta:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  {% block extra_css %}{% endblock %}

  <!-- Inline background style – can move to style.css -->
  <style>
    body {
      background: #faf6f0;
      background-image: radial-gradient(circle at 10% 20%, rgba(201, 151, 46, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(107, 30, 60, 0.05) 0%, transparent 50%);
      min-height: 100vh;
    }
    .invite-frame {
      background: rgba(255, 252, 248, 0.85);
      backdrop-filter: blur(2px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

  <!-- ─── LAYOUT BLOCK (overridable) ─── -->
  {% block layout %}
    <!-- Default: auth pages with corner ornaments -->
    <svg class="ornament-defs" aria-hidden="true" focusable="false">
      <defs>
        <symbol id="corner-flourish" viewBox="0 0 120 120">
          <path d="M4 4 C 4 40, 10 70, 40 86 C 60 97, 70 70, 56 58 C 46 50, 38 60, 46 68"
                fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="46" cy="68" r="3.2" fill="currentColor"/>
          <path d="M4 4 C 40 4, 70 10, 86 40 C 97 60, 70 70, 58 56 C 50 46, 60 38, 68 46"
                fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="68" cy="46" r="3.2" fill="currentColor"/>
          <path d="M4 4 L 4 4" stroke="currentColor"/>
          <circle cx="18" cy="18" r="2" fill="currentColor" opacity=".7"/>
        </symbol>
        <symbol id="seal-monogram" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="1" opacity=".6"/>
          <text x="50" y="62" text-anchor="middle" font-family="'Noto Serif Devanagari', serif"
                font-size="36" fill="currentColor">वि</text>
        </symbol>
      </defs>
    </svg>

    <main class="invite-frame">
      <svg class="corner corner--tl"><use href="#corner-flourish"/></svg>
      <svg class="corner corner--tr"><use href="#corner-flourish"/></svg>
      <svg class="corner corner--bl"><use href="#corner-flourish"/></svg>
      <svg class="corner corner--br"><use href="#corner-flourish"/></svg>
      {% block content %}{% endblock %}
    </main>
  {% endblock %}

  <script src="{% static 'js/auth.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
